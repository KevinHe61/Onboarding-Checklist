<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记账本 - 日常开销记录</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .amount-positive { color: #10b981; }
        .amount-negative { color: #ef4444; }
    </style>
</head>
<body class="font-sans antialiased">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <h1 class="text-2xl font-bold text-purple-600">💰 智能记账本</h1>
                <div class="flex space-x-4">
                    <a href="index.html" class="px-4 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition">记录</a>
                    <a href="statistics.html" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">统计</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid md:grid-cols-3 gap-8">
            <!-- Left Column: Form -->
            <div class="md:col-span-1">
                <div class="glass-card rounded-2xl shadow-xl p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center">
                        <span class="bg-purple-100 p-2 rounded-lg mr-3">📝</span>
                        记录支出
                    </h2>
                    
                    <form id="expenseForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                            <input type="date" id="date" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">分类</label>
                            <select id="category" required
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                <option value="">请选择分类</option>
                                <option value="餐饮">🍔 餐饮</option>
                                <option value="交通">🚗 交通</option>
                                <option value="购物">🛒 购物</option>
                                <option value="娱乐">🎮 娱乐</option>
                                <option value="居住">🏠 居住</option>
                                <option value="医疗">💊 医疗</option>
                                <option value="教育">📚 教育</option>
                                <option value="通讯">📱 通讯</option>
                                <option value="服装">👔 服装</option>
                                <option value="社交">🎉 社交</option>
                                <option value="旅游">✈️ 旅游</option>
                                <option value="其他">📌 其他</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">金额 (元)</label>
                            <input type="number" id="amount" step="0.01" min="0.01" required placeholder="0.00"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">消费地点/商家</label>
                            <input type="text" id="description" required placeholder="例如：麦当劳、星巴克"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">支付方式</label>
                            <select id="paymentMethod"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                                <option value="现金">💵 现金</option>
                                <option value="微信支付">💚 微信支付</option>
                                <option value="支付宝">🔵 支付宝</option>
                                <option value="银行卡">💳 银行卡</option>
                                <option value="信用卡">💳 信用卡</option>
                                <option value="其他">📱 其他</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">备注</label>
                            <textarea id="notes" rows="2" placeholder="可选备注信息..."
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"></textarea>
                        </div>

                        <button type="submit" id="submitBtn"
                            class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-3 px-4 rounded-lg font-semibold hover:from-purple-700 hover:to-indigo-700 transition transform hover:scale-105">
                            添加记录
                        </button>
                    </form>
                </div>

                <!-- Quick Stats Card -->
                <div class="glass-card rounded-2xl shadow-xl p-6 mt-6">
                    <h3 class="text-lg font-bold text-gray-800 mb-4">💡 今日概览</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center p-3 bg-green-50 rounded-lg">
                            <span class="text-gray-600">今日支出</span>
                            <span id="todayTotal" class="text-xl font-bold text-green-600">¥0.00</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-blue-50 rounded-lg">
                            <span class="text-gray-600">本月支出</span>
                            <span id="monthTotal" class="text-xl font-bold text-blue-600">¥0.00</span>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-purple-50 rounded-lg">
                            <span class="text-gray-600">本月记录</span>
                            <span id="monthCount" class="text-xl font-bold text-purple-600">0 笔</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Expense List -->
            <div class="md:col-span-2">
                <div class="glass-card rounded-2xl shadow-xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold text-gray-800 flex items-center">
                            <span class="bg-purple-100 p-2 rounded-lg mr-3">📋</span>
                            支出记录
                        </h2>
                        <div class="flex space-x-2">
                            <button id="filterAll" class="filter-btn px-3 py-1 rounded-full bg-purple-600 text-white text-sm">全部</button>
                            <button id="filterToday" class="filter-btn px-3 py-1 rounded-full bg-gray-200 text-gray-700 text-sm">今天</button>
                            <button id="filterWeek" class="filter-btn px-3 py-1 rounded-full bg-gray-200 text-gray-700 text-sm">本周</button>
                            <button id="filterMonth" class="filter-btn px-3 py-1 rounded-full bg-gray-200 text-gray-700 text-sm">本月</button>
                        </div>
                    </div>

                    <!-- Search Bar -->
                    <div class="mb-4">
                        <input type="text" id="searchInput" placeholder="搜索消费记录..."
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                    </div>

                    <!-- Expense List -->
                    <div id="expenseList" class="space-y-3">
                        <div class="text-center py-8 text-gray-400">
                            <div class="text-4xl mb-2">📭</div>
                            <p>暂无记录，开始记账吧！</p>
                        </div>
                    </div>

                    <!-- Pagination -->
                    <div id="pagination" class="flex justify-center items-center space-x-2 mt-6 hidden">
                        <button id="prevPage" class="px-3 py-1 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50">上一页</button>
                        <span id="pageInfo" class="text-gray-600">第 1 页</span>
                        <button id="nextPage" class="px-3 py-1 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50">下一页</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-4 right-4 transform translate-y-full opacity-0 transition-all duration-300 z-50">
        <div class="bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg flex items-center">
            <span id="toastIcon" class="mr-2">✓</span>
            <span id="toastMessage">操作成功</span>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-xl p-6 max-w-sm mx-4">
            <h3 class="text-lg font-bold text-gray-800 mb-2">确认删除</h3>
            <p class="text-gray-600 mb-4">确定要删除这条记录吗？此操作无法撤销。</p>
            <div class="flex space-x-3">
                <button id="cancelDelete" class="flex-1 px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">取消</button>
                <button id="confirmDelete" class="flex-1 px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600">删除</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://bschpajkbpyyenxyjesw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ifbgimWQ6dVERyYguSrfiQ_Wn4BuGqS';
        
        // Initialize Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State
        let currentPage = 1;
        const pageSize = 10;
        let currentFilter = 'all';
        let searchQuery = '';
        let deleteId = null;
        let expenses = [];

        // Category emoji mapping
        const categoryEmoji = {
            '餐饮': '🍔', '交通': '🚗', '购物': '🛒', '娱乐': '🎮',
            '居住': '🏠', '医疗': '💊', '教育': '📚', '通讯': '📱',
            '服装': '👔', '社交': '🎉', '旅游': '✈️', '其他': '📌'
        };

        // Payment method emoji
        const paymentEmoji = {
            '现金': '💵', '微信支付': '💚', '支付宝': '🔵',
            '银行卡': '💳', '信用卡': '💳', '其他': '📱'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            setDefaultDate();
            loadExpenses();
            loadQuickStats();
            setupEventListeners();
        });

        // Set default date to today
        function setDefaultDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date').value = today;
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('expenseForm').addEventListener('submit', handleSubmit);
            
            // Filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => {
                        b.classList.remove('bg-purple-600', 'text-white');
                        b.classList.add('bg-gray-200', 'text-gray-700');
                    });
                    e.target.classList.remove('bg-gray-200', 'text-gray-700');
                    e.target.classList.add('bg-purple-600', 'text-white');
                    
                    const filterType = e.target.id.replace('filter', '').toLowerCase();
                    currentFilter = filterType === 'all' ? 'all' : filterType;
                    currentPage = 1;
                    loadExpenses();
                });
            });

            // Search
            let searchTimeout;
            document.getElementById('searchInput').addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    searchQuery = e.target.value.trim();
                    currentPage = 1;
                    loadExpenses();
                }, 300);
            });

            // Pagination
            document.getElementById('prevPage').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadExpenses();
                }
            });

            document.getElementById('nextPage').addEventListener('click', () => {
                currentPage++;
                loadExpenses();
            });

            // Delete modal
            document.getElementById('cancelDelete').addEventListener('click', closeDeleteModal);
            document.getElementById('confirmDelete').addEventListener('click', confirmDelete);
        }

        // Handle form submit
        async function handleSubmit(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '添加中...';

            const expense = {
                date: document.getElementById('date').value,
                category: document.getElementById('category').value,
                description: document.getElementById('description').value.trim(),
                amount: parseFloat(document.getElementById('amount').value),
                payment_method: document.getElementById('paymentMethod').value,
                notes: document.getElementById('notes').value.trim() || null
            };

            try {
                const { data, error } = await supabase
                    .from('expenses')
                    .insert([expense])
                    .select();

                if (error) throw error;

                showToast('记录添加成功！', 'success');
                e.target.reset();
                setDefaultDate();
                loadExpenses();
                loadQuickStats();
            } catch (error) {
                console.error('Error:', error);
                showToast('添加失败: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '添加记录';
            }
        }

        // Load expenses
        async function loadExpenses() {
            try {
                let query = supabase
                    .from('expenses')
                    .select('*', { count: 'exact' })
                    .order('date', { ascending: false })
                    .order('created_at', { ascending: false })
                    .range((currentPage - 1) * pageSize, currentPage * pageSize - 1);

                // Apply filter
                const today = new Date();
                if (currentFilter === 'today') {
                    query = query.eq('date', today.toISOString().split('T')[0]);
                } else if (currentFilter === 'week') {
                    const weekAgo = new Date(today - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
                    query = query.gte('date', weekAgo);
                } else if (currentFilter === 'month') {
                    const monthStart = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
                    query = query.gte('date', monthStart);
                }

                // Apply search
                if (searchQuery) {
                    query = query.or(`description.ilike.%${searchQuery}%,notes.ilike.%${searchQuery}%,category.ilike.%${searchQuery}%`);
                }

                const { data, error, count } = await query;

                if (error) throw error;

                expenses = data || [];
                renderExpenses();
                updatePagination(count);
            } catch (error) {
                console.error('Error loading expenses:', error);
                showToast('加载失败: ' + error.message, 'error');
            }
        }

        // Render expenses list
        function renderExpenses() {
            const container = document.getElementById('expenseList');
            
            if (expenses.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-8 text-gray-400">
                        <div class="text-4xl mb-2">📭</div>
                        <p>暂无记录，开始记账吧！</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = expenses.map(expense => {
                const emoji = categoryEmoji[expense.category] || '📌';
                const payEmoji = paymentEmoji[expense.payment_method] || '📱';
                const dateStr = new Date(expense.date).toLocaleDateString('zh-CN', {
                    month: 'short', day: 'numeric', weekday: 'short'
                });
                
                return `
                    <div class="fade-in bg-gray-50 rounded-xl p-4 hover:bg-gray-100 transition group" data-id="${expense.id}">
                        <div class="flex items-start justify-between">
                            <div class="flex items-start space-x-3">
                                <div class="text-2xl">${emoji}</div>
                                <div>
                                    <div class="font-semibold text-gray-800">${expense.description}</div>
                                    <div class="text-sm text-gray-500 mt-1">
                                        <span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded-full text-xs mr-2">${expense.category}</span>
                                        <span>${dateStr}</span>
                                        <span class="ml-2">${payEmoji} ${expense.payment_method}</span>
                                    </div>
                                    ${expense.notes ? `<div class="text-sm text-gray-400 mt-1 italic">${expense.notes}</div>` : ''}
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-bold text-red-500">-¥${expense.amount.toFixed(2)}</div>
                                <button onclick="openDeleteModal('${expense.id}')" 
                                    class="delete-btn opacity-0 group-hover:opacity-100 mt-2 text-red-500 hover:text-red-700 transition">
                                    🗑️ 删除
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Update pagination
        function updatePagination(total) {
            const totalPages = Math.ceil(total / pageSize);
            const pagination = document.getElementById('pagination');
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevPage');
            const nextBtn = document.getElementById('nextPage');

            if (total <= pageSize) {
                pagination.classList.add('hidden');
                return;
            }

            pagination.classList.remove('hidden');
            pageInfo.textContent = `第 ${currentPage} / ${totalPages} 页`;
            prevBtn.disabled = currentPage <= 1;
            nextBtn.disabled = currentPage >= totalPages;
        }

        // Load quick stats
        async function loadQuickStats() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const monthStart = new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0];

                // Today's total
                const { data: todayData } = await supabase
                    .from('expenses')
                    .select('amount')
                    .eq('date', today);
                
                const todayTotal = todayData?.reduce((sum, e) => sum + e.amount, 0) || 0;
                document.getElementById('todayTotal').textContent = `¥${todayTotal.toFixed(2)}`;

                // Month total
                const { data: monthData } = await supabase
                    .from('expenses')
                    .select('amount')
                    .gte('date', monthStart);
                
                const monthTotal = monthData?.reduce((sum, e) => sum + e.amount, 0) || 0;
                document.getElementById('monthTotal').textContent = `¥${monthTotal.toFixed(2)}`;
                document.getElementById('monthCount').textContent = `${monthData?.length || 0} 笔`;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Delete modal functions
        function openDeleteModal(id) {
            deleteId = id;
            document.getElementById('deleteModal').classList.remove('hidden');
        }

        function closeDeleteModal() {
            deleteId = null;
            document.getElementById('deleteModal').classList.add('hidden');
        }

        async function confirmDelete() {
            if (!deleteId) return;

            try {
                const { error } = await supabase
                    .from('expenses')
                    .delete()
                    .eq('id', deleteId);

                if (error) throw error;

                showToast('删除成功！', 'success');
                closeDeleteModal();
                loadExpenses();
                loadQuickStats();
            } catch (error) {
                console.error('Error deleting:', error);
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toastIcon');
            const toastMessage = document.getElementById('toastMessage');

            toastMessage.textContent = message;
            toastIcon.textContent = type === 'success' ? '✓' : '✕';
            toast.firstElementChild.className = `px-6 py-3 rounded-lg shadow-lg flex items-center ${
                type === 'success' ? 'bg-green-500' : 'bg-red-500'
            } text-white`;

            toast.classList.remove('translate-y-full', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-full', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
